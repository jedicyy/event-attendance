services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_NAME=event_db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=3306

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: event_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    volumes:
      - ./mobile/app:/app/app
      - ./mobile/package.json:/app/package.json
      - ./mobile/package-lock.json:/app/package-lock.json
      - /app/node_modules
      - /app/.expo
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${LOCAL_IP:-192.168.100.14}
      - API_BASE=http://${LOCAL_IP:-192.168.100.14}:8000/api
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    stdin_open: true
    tty: true

volumes:
  db_data:
